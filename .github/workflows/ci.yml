name: Hermes GPU CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator make
      - name: Lint
        run: make lint
      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: reports/lint.rpt

  sim:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator make
      - name: Build & Simulate
        run: make sim
      - name: Upload waveform
        uses: actions/upload-artifact@v4
        with:
          name: waveform
          path: hermes_gpu.vcd
